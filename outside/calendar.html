<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/assets/icons/calendar/icon-192.png">
    <link rel="manifest" href="/calendar-manifest.json">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Changeover Calendar | QCO System</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Poppins', 'sans-serif'] },
                    colors: { brand: { 50: '#f0f9ff', 500: '#0ea5e9', 900: '#0c4a6e' } },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'highlight-pulse': 'highlightPulse 1s ease-in-out infinite'
                    },
                    keyframes: {
                        highlightPulse: {
                            '0%, 100%': { boxShadow: '0 0 0 4px rgba(251, 191, 36, 0.6)' },
                            '50%': { boxShadow: '0 0 0 8px rgba(251, 191, 36, 0.2)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* BASE */
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: none;
        }

        #appContent {
            transform: translateZ(0);
            will-change: transform;
            backface-visibility: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        /* Glass */
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(240, 249, 255, 0.9));
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 40px 100px -12px rgba(0, 0, 0, 0.08), 0 20px 50px -12px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 1.5rem;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 40px 100px -12px rgba(0, 0, 0, 0.08), 0 20px 50px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Calendar Grid */
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-header-cell {
            text-align: center;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.5rem 0;
            color: #64748b;
        }

        .cal-header-cell.friday {
            color: #e11d48;
        }

        .cal-day {
            min-height: 90px;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.4rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.6);
        }

        .cal-day:hover {
            border-color: #93c5fd;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .cal-day.today {
            border-color: #3b82f6;
            border-width: 2px;
            background: rgba(239, 246, 255, 0.5);
        }

        .cal-day.empty {
            background: transparent;
            border-color: transparent;
            cursor: default;
            min-height: 0;
        }

        .cal-day.empty:hover {
            box-shadow: none;
            border-color: transparent;
        }

        .cal-day.friday {
            background: rgba(255, 241, 242, 0.5);
            border-color: #fecdd3;
        }

        .cal-day.friday .day-num {
            color: #e11d48;
        }

        .cal-day.highlighted {
            animation: highlightPulse 1s ease-in-out infinite;
            border-color: #f59e0b !important;
            border-width: 2px;
            z-index: 10;
        }

        .day-num {
            font-size: 0.75rem;
            font-weight: 700;
            color: #334155;
        }

        .day-count {
            font-size: 0.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border-radius: 9999px;
            padding: 1px 6px;
            line-height: 1.4;
        }

        .qco-chip {
            font-size: 0.55rem;
            font-weight: 600;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            padding: 1px 4px;
            color: #475569;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            display: block;
            transition: all 0.3s ease;
        }

        .qco-chip.highlighted {
            background: #fef3c7 !important;
            border-color: #f59e0b !important;
            color: #92400e !important;
            font-weight: 800;
        }

        /* Linewise View */
        .linewise-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
        }

        .linewise-table th,
        .linewise-table td {
            border: 1px solid #e2e8f0;
            padding: 4px;
            text-align: center;
            font-size: 0.65rem;
            min-width: 40px;
        }

        .linewise-table th {
            background: #f8fafc;
            font-weight: 700;
            color: #475569;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .linewise-table th.line-header {
            position: sticky;
            left: 0;
            z-index: 10;
            background: #f1f5f9;
            min-width: 120px;
            text-align: left;
            padding-left: 8px;
        }

        .linewise-table td.line-cell {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #fafbfc;
            text-align: left;
            padding-left: 8px;
            font-weight: 600;
            color: #334155;
            min-width: 120px;
        }

        .linewise-table td.friday-col {
            background: rgba(255, 241, 242, 0.4);
        }

        .linewise-table th.friday-col {
            background: #fff1f2;
            color: #e11d48;
        }

        .linewise-cell-chip {
            font-size: 0.55rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ede9fe, #e0e7ff);
            border: 1px solid #c7d2fe;
            border-radius: 4px;
            padding: 1px 3px;
            color: #4338ca;
            display: inline-block;
            margin: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .linewise-cell-chip.highlighted {
            background: #fef3c7 !important;
            border-color: #f59e0b !important;
            color: #92400e !important;
            font-weight: 800;
        }

        /* Scrollbar */
        #appContent::-webkit-scrollbar {
            width: 6px;
        }

        #appContent::-webkit-scrollbar-track {
            background: transparent;
        }

        #appContent::-webkit-scrollbar-thumb {
            background-color: rgba(148, 163, 184, 0.3);
            border-radius: 3px;
        }

        /* Modal */
        .modal-backdrop {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        select,
        input,
        button {
            min-height: 44px;
        }

        /* Bottom Tab Bar (mobile only) */
        .bottom-tabs {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-top: 1px solid rgba(226, 232, 240, 0.6);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .bottom-tabs .tab-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0 4px;
            gap: 2px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #94a3b8;
            transition: color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .bottom-tabs .tab-item.active {
            color: #7c3aed;
        }

        .bottom-tabs .tab-item .tab-icon {
            width: 22px;
            height: 22px;
        }

        .bottom-tabs .tab-item .tab-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #7c3aed;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .bottom-tabs .tab-item.active .tab-dot {
            opacity: 1;
        }

        /* ============================================================ */
        /*                     MOBILE OVERHAUL                         */
        /* ============================================================ */
        @media (max-width: 768px) {

            .glass,
            .glass-card {
                backdrop-filter: none !important;
                background: rgba(255, 255, 255, 0.95) !important;
            }

            #mainApp {
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
                padding-top: 0.5rem !important;
            }

            /* --- Header: compact, native feel with safe-area --- */
            #appHeader {
                min-height: auto !important;
                padding-left: 0.75rem !important;
                padding-right: 0.75rem !important;
                padding-bottom: 0.5rem !important;
                padding-top: calc(env(safe-area-inset-top, 12px) + 0.5rem) !important;
                gap: 0.5rem !important;
                flex-direction: column !important;
                align-items: stretch !important;
            }

            #appHeader h1 {
                font-size: 0.8rem !important;
            }

            #appHeader p {
                font-size: 8px !important;
            }

            .header-icon-box {
                width: 2rem !important;
                height: 2rem !important;
                border-radius: 0.5rem !important;
            }

            .header-icon-box i {
                width: 14px !important;
                height: 14px !important;
            }

            /* hide desktop toggles on mobile */
            .desktop-controls {
                display: none !important;
            }

            /* Mobile header: brand row */
            .mobile-header-brand {
                display: flex;
                align-items: center;
                justify-content: space-between;
                width: 100%;
            }

            /* show bottom tabs */
            .bottom-tabs {
                display: flex;
            }

            /* add bottom safe-area room so content doesn't hide behind tabs */
            #appContent {
                padding-bottom: calc(70px + env(safe-area-inset-bottom, 0)) !important;
            }

            /* --- Month Nav --- */
            #monthTitle {
                font-size: 1.1rem !important;
                min-width: auto !important;
            }

            .month-nav-btn {
                width: 2.5rem !important;
                height: 2.5rem !important;
                border-radius: 0.75rem !important;
            }

            /* --- Metrics: horizontal scroll strip --- */
            .metrics-grid {
                display: flex !important;
                flex-wrap: nowrap !important;
                overflow-x: auto !important;
                gap: 0.5rem !important;
                padding-bottom: 0.25rem;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
                margin-bottom: 0.75rem !important;
            }

            .metrics-grid>div {
                flex: 0 0 42% !important;
                scroll-snap-align: start;
                padding: 0.75rem !important;
                border-radius: 1rem !important;
            }

            .metrics-grid .metric-icon {
                width: 2rem !important;
                height: 2rem !important;
                border-radius: 0.5rem !important;
            }

            .metrics-grid .metric-icon i {
                width: 14px !important;
                height: 14px !important;
            }

            .metrics-grid .metric-label {
                font-size: 8px !important;
            }

            .metrics-grid .metric-value {
                font-size: 1.25rem !important;
            }

            .metrics-grid .metric-sub {
                font-size: 8px !important;
            }

            .metrics-grid::-webkit-scrollbar {
                display: none;
            }

            /* --- Calendar cells: touch-sized --- */
            .cal-grid {
                gap: 2px;
            }

            .cal-day {
                min-height: 52px;
                border-radius: 0.5rem;
                padding: 0.25rem;
            }

            .cal-day .qco-chip {
                display: none;
            }

            .day-num {
                font-size: 0.7rem;
            }

            .day-count {
                font-size: 0.5rem;
                padding: 0 4px;
            }

            /* --- Calendar card & linewise card --- */
            .glass-card {
                border-radius: 1rem !important;
                padding: 0.75rem !important;
            }

            /* --- Modal: bottom sheet --- */
            #dayModal>div {
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                max-width: 100% !important;
                max-height: 85vh !important;
                border-radius: 1.5rem 1.5rem 0 0 !important;
                margin: 0 !important;
                animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            }

            #dayModal>div::before {
                content: '';
                display: block;
                width: 36px;
                height: 4px;
                background: #cbd5e1;
                border-radius: 99px;
                margin: 8px auto 0;
            }

            /* --- Footer: hide on mobile --- */
            footer {
                display: none !important;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        /* Small phones */
        @media (max-width: 380px) {
            .cal-day {
                min-height: 44px;
            }

            .day-num {
                font-size: 0.6rem;
            }

            .metrics-grid>div {
                flex: 0 0 55% !important;
            }
        }
    </style>
</head>

<body class="relative min-h-screen">

    <!-- Background Gradients -->
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
        <div
            class="absolute top-0 right-0 w-[500px] h-[500px] bg-[radial-gradient(circle,rgba(167,139,250,0.2)_0%,rgba(255,255,255,0)_70%)] animate-pulse-slow">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-[radial-gradient(circle,rgba(56,189,248,0.15)_0%,rgba(255,255,255,0)_70%)] animate-pulse-slow">
        </div>
    </div>

    <!-- Main Shell -->
    <div id="appShell" class="flex flex-col h-screen overflow-hidden">

        <!-- Header -->
        <header id="appHeader"
            class="glass h-auto min-h-[5rem] flex flex-wrap items-center justify-between px-4 md:px-8 z-20 flex-shrink-0 sticky top-0 border-b border-white/20 py-3 gap-3">
            <!-- Row 1: Brand -->
            <div class="flex items-center gap-3">
                <div
                    class="header-icon-box w-10 h-10 bg-gradient-to-br from-violet-600 to-indigo-700 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="calendar-days" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="font-heading font-bold text-slate-800 text-sm tracking-wide">Changeover Calendar</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Monthly Overview</p>
                </div>
                <button onclick="loadMonth()"
                    class="ml-2 px-3 py-1.5 bg-slate-100 text-violet-600 rounded-xl hover:bg-slate-200 transition-all active:scale-95 flex items-center gap-1.5 text-xs font-bold desktop-controls">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Refresh
                </button>
            </div>

            <!-- Desktop controls (hidden on mobile via CSS) -->
            <div class="desktop-controls flex items-center gap-2 flex-wrap">
                <!-- QCO Search -->
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="qcoSearchInput" placeholder="Search QCO..."
                        class="pl-10 pr-4 py-2.5 rounded-xl bg-white border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 w-44 transition-all hover:border-slate-300"
                        onkeydown="if(event.key==='Enter') searchQCO()">
                </div>
                <button onclick="searchQCO()"
                    class="p-2.5 bg-violet-600 text-white rounded-xl hover:bg-violet-700 transition-all hover:shadow-md active:scale-95 flex items-center justify-center">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </button>

                <!-- Display Filter -->
                <div class="flex bg-white/80 backdrop-blur-sm border border-slate-200/60 rounded-xl p-1 shadow-sm">
                    <button id="btnDisplayQCO" onclick="switchDisplayMode('qco')"
                        class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white shadow-sm flex items-center gap-2">
                        <i data-lucide="hash" class="w-3.5 h-3.5"></i> QCO #
                    </button>
                    <button id="btnDisplayStyle" onclick="switchDisplayMode('style')"
                        class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-2">
                        <i data-lucide="shirt" class="w-3.5 h-3.5"></i> Style
                    </button>
                </div>

                <!-- View Toggle -->
                <div class="flex bg-white/80 backdrop-blur-sm border border-slate-200/60 rounded-xl p-1 shadow-sm">
                    <button id="btnCalView" onclick="switchView('calendar')"
                        class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-violet-600 text-white shadow-sm flex items-center gap-2">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Calendar
                    </button>
                    <button id="btnLineView" onclick="switchView('linewise')"
                        class="px-4 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 hover:text-slate-800 hover:bg-slate-100 flex items-center gap-2">
                        <i data-lucide="list-tree" class="w-3.5 h-3.5"></i> Linewise
                    </button>
                </div>

                <!-- Desktop Install PWA Button (Hidden by default, shown if install prompt available) -->
                <button id="btnInstallDesktop" onclick="installPWA()" style="display:none;"
                    class="px-4 py-2 text-xs font-bold rounded-xl transition-all bg-gradient-to-r from-emerald-500 to-teal-500 text-white shadow-sm hover:shadow-md active:scale-95 flex items-center gap-2 border border-emerald-400">
                    <i data-lucide="download" class="w-4 h-4 text-white"></i> Install App
                </button>
            </div>

            <!-- Mobile Row 2: Search bar (full width, own line) -->
            <div class="md:hidden flex items-center gap-2 w-full">
                <button onclick="loadMonth()"
                class="p-2.5 bg-slate-100 text-violet-600 rounded-xl active:scale-95 flex items-center justify-center flex-shrink-0"
                style="min-height:40px;min-width:40px;">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
            <div class="relative flex-1">
                <i data-lucide="search"
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-3.5 h-3.5"></i>
                <input type="text" id="qcoSearchInputMobile" placeholder="Search QCO..."
                    class="w-full pl-9 pr-3 py-2.5 rounded-xl bg-white border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 transition-all"
                    onkeydown="if(event.key==='Enter') searchQCOMobile()">
            </div>
            <button onclick="searchQCOMobile()"
                class="p-2.5 bg-violet-600 text-white rounded-xl active:scale-95 flex items-center justify-center flex-shrink-0 shadow-sm"
                style="min-height:40px;min-width:40px;">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </button>
            </div>

            <!-- Mobile Row 3: Filter toggles (own line, spaced out) -->
            <div class="md:hidden flex items-center gap-2 w-full">
                <!-- Display mode toggle -->
                <div class="flex flex-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                    <button id="btnDisplayQCOMobile" onclick="switchDisplayMode('qco')"
                        class="flex-1 px-3 py-1.5 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white flex items-center justify-center gap-1.5">
                        <i data-lucide="hash" class="w-3.5 h-3.5"></i> QCO #
                    </button>
                    <button id="btnDisplayStyleMobile" onclick="switchDisplayMode('style')"
                        class="flex-1 px-3 py-1.5 text-xs font-bold rounded-lg transition-all text-slate-500 flex items-center justify-center gap-1.5">
                        <i data-lucide="shirt" class="w-3.5 h-3.5"></i> Style
                    </button>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div id="appContent" class="flex-1 relative overflow-y-auto">
            <!-- Offline Banner -->
            <div id="offlineBanner" class="hidden w-full bg-red-50 text-red-600 text-center py-1.5 text-[11px] font-bold tracking-wide">
                You are offline. Showing cached data.
            </div>
            <div id="mainApp" class="flex flex-col pt-6 pb-32 px-4 md:px-6 opacity-0" style="min-height:100%">
                <div class="max-w-[1400px] mx-auto w-full flex flex-col flex-1">

                    <!-- Month Navigation -->
                    <div class="flex items-center justify-center gap-4 mb-6">
                        <button onclick="changeMonth(-1)"
                            class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm">
                            <i data-lucide="chevron-left" class="w-5 h-5 text-slate-600"></i>
                        </button>
                        <h2 id="monthTitle"
                            class="text-xl md:text-2xl font-heading font-bold text-slate-900 min-w-[220px] text-center">
                        </h2>
                        <button onclick="changeMonth(1)"
                            class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm">
                            <i data-lucide="chevron-right" class="w-5 h-5 text-slate-600"></i>
                        </button>
                    <button onclick="goToToday()" title="Go to Today"
                        class="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center hover:bg-slate-50 transition-colors shadow-sm">

    <script>
        // ==========================================
        // FIREBASE CONFIG
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyC9Ri2Je52C1D6xYqH9mo-zT5Wuhd_akX8",
            authDomain: "changeover-app.firebaseapp.com",
            projectId: "changeover-app",
            storageBucket: "changeover-app.firebasestorage.app",
            messagingSenderId: "690912562852",
            appId: "1:690912562852:web:80404067e684babbc4e031"
        };

        // ==========================================
        // PERSONNEL DATA (synced with schedule.html)
        // ==========================================
        const personnelData = {
            "1": { supervisor: "WASANA" }, "1A": { supervisor: "WASANA" },
            "2": { supervisor: "SOHORAB" }, "3": { supervisor: "SOHEL" },
            "6+17": { supervisor: "SHAKIL/MUSUM" }, "7": { supervisor: "NAGENDER" },
            "7A": { supervisor: "KAMAL" }, "8+5": { supervisor: "BALISTER/FARUK" },
            "9": { supervisor: "SUMI" }, "10": { supervisor: "RAJ KUMAR" },
            "11+15": { supervisor: "KAMAL/MUNSAF" }, "12": { supervisor: "DHARAMEDER" },
            "13/21": { supervisor: "SUMON/DEVRAJ" }, "14": { supervisor: "SHARIF" },
            "16": { supervisor: "RAHMAN" }, "16A": { supervisor: "RHANIA" },
            "18": { supervisor: "JAKIR" }, "19": { supervisor: "ALAMGIR" },
            "20": { supervisor: "GAYANI" }, "22": { supervisor: "ASHRAFUL" },
            "23": { supervisor: "RUMA" }, "24": { supervisor: "NASIR" },
            "25": { supervisor: "AKBAR" }, "26/4": { supervisor: "HIMAYIT/AHMAD" },
            "28": { supervisor: "RUPNANAYAN" }, "29": { supervisor: "SUBA" },
            "30": { supervisor: "RAZIB" }, "31": { supervisor: "AKESH" },
            "32": { supervisor: "KALU" }
        };

        // Build exploded (split) personnel map — each sub-line gets its own entry
        function buildExplodedPersonnel() {
            const exploded = {};
            for (const [key, val] of Object.entries(personnelData)) {
                const lineParts = key.split(/[\+\/]/);
                const supervisors = val.supervisor.split('/');
                if (lineParts.length > 1) {
                    lineParts.forEach((lp, i) => {
                        const lp_trimmed = lp.trim();
                        if (!exploded[lp_trimmed]) {
                            exploded[lp_trimmed] = { supervisor: (supervisors[i] || supervisors[0]).trim(), originalKey: key };
                        }
                    });
                } else {
                    if (!exploded[key]) {
                        exploded[key] = { supervisor: val.supervisor, originalKey: key };
                    }
                }
            }
            return exploded;
        }
        const explodedPersonnel = buildExplodedPersonnel();

        // Get the display label for a changeover based on display mode
        function getChipLabel(co) {
            if (displayMode === 'style') {
                const from = (co.currentStyle || '').slice(-5);
                const to = (co.upcomingStyle || '').slice(-5);
                return `${from}-${to}`;
            }
            return co.qcoNumber || co.id;
        }

        // Resolve which individual sub-lines a changeover belongs to
        function resolveSubLines(lineNumber) {
            if (!lineNumber) return ['Unknown'];
            const parts = lineNumber.split(/[\+\/]/).map(p => p.trim());
            return parts;
        }

        // ==========================================
        // STATE
        // ==========================================
        let db;
        let currentYear, currentMonth; // 0-indexed month
        let allChangeovers = []; // cached for current month
        let currentView = 'calendar';
        let displayMode = 'qco'; // 'qco' or 'style'
        let highlightTimeout = null;

        const DAYS_OF_WEEK = ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri'];
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        // ==========================================
        // INITIALIZATION
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            gsap.to("#mainApp", { opacity: 1, duration: 0.4, ease: "power2.out" });

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();

            // Enable Firestore offline persistence (matches Flutter app's persistenceEnabled: true)
            db.enablePersistence({ synchronizeTabs: true }).catch(err => {
                if (err.code === 'failed-precondition') {
                    console.warn('Persistence failed: multiple tabs open');
                } else if (err.code === 'unimplemented') {
                    console.warn('Persistence not supported in this browser');
                }
            });

            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();

            loadMonth();
            lucide.createIcons();

            // Offline detection
            function updateOnlineStatus() {
                const banner = document.getElementById('offlineBanner');
                if (banner) {
                    if (navigator.onLine) {
                        banner.classList.add('hidden');
                    } else {
                        banner.classList.remove('hidden');
                    }
                }
            }
            window.addEventListener('online', () => { updateOnlineStatus(); loadMonth(); });
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        });

        // ==========================================
        // DATA LOADING
        // ==========================================
        async function loadMonth() {
            document.getElementById('monthTitle').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;

            const startOfMonth = new Date(currentYear, currentMonth, 1);
            const endOfMonth = new Date(currentYear, currentMonth + 1, 0, 23, 59, 59);

            // Use cache when offline, server when online (matches Flutter app)
            const getOpts = navigator.onLine ? {} : { source: 'cache' };

            try {
                const snapshot = await db.collection('changeovers')
                    .where('scheduledDate', '>=', startOfMonth.toISOString().slice(0, 10))
                    .where('scheduledDate', '<=', endOfMonth.toISOString().slice(0, 10) + 'T23:59')
                    .get(getOpts);

                allChangeovers = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.status === 'discarded') return;
                    allChangeovers.push({ id: doc.id, ...data });
                });
            } catch (e) {
                console.error("Error loading changeovers:", e);
                // Fallback: load ALL and filter client-side
                try {
                    const snapshot = await db.collection('changeovers').get(getOpts);
                    allChangeovers = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (data.status === 'discarded') return;
                        if (!data.scheduledDate) return;

                        let dateStr = data.scheduledDate;
                        if (dateStr.toDate) dateStr = dateStr.toDate().toISOString();

                        const d = new Date(dateStr);
                        if (d.getFullYear() === currentYear && d.getMonth() === currentMonth) {
                            allChangeovers.push({ id: doc.id, ...data });
                        }
                    });
                } catch (e2) {
                    console.error("Fallback load error:", e2);
                }
            }

            computeMetrics();
            renderCalendar();
            renderLinewise();
        }

        function getDateKey(scheduledDate) {
            if (!scheduledDate) return null;
            let dateStr = scheduledDate;
            if (dateStr.toDate) dateStr = dateStr.toDate().toISOString();
            // Handle formats like "2026-03-04T10:00" or ISO string
            return dateStr.slice(0, 10); // "YYYY-MM-DD"
        }

        function groupByDate() {
            const map = {};
            allChangeovers.forEach(co => {
                const key = getDateKey(co.scheduledDate);
                if (!key) return;
                if (!map[key]) map[key] = [];
                map[key].push(co);
            });
            return map;
        }

        // ==========================================
        // METRICS
        // ==========================================
        function computeMetrics() {
            const byDate = groupByDate();
            const total = allChangeovers.length;
            document.getElementById('metricTotal').textContent = total;

            // Busiest Day
            let busiestDay = null, busiestDayCount = 0;
            for (const [key, arr] of Object.entries(byDate)) {
                if (arr.length > busiestDayCount) {
                    busiestDayCount = arr.length;
                    busiestDay = key;
                }
            }
            if (busiestDay) {
                const d = new Date(busiestDay + 'T00:00');
                document.getElementById('metricBusiestDay').textContent = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                document.getElementById('metricBusiestDayCount').textContent = `${busiestDayCount} changeovers`;
            } else {
                document.getElementById('metricBusiestDay').textContent = '—';
                document.getElementById('metricBusiestDayCount').textContent = '';
            }

            // Busiest Week
            const weekMap = {};
            for (const [key, arr] of Object.entries(byDate)) {
                const d = new Date(key + 'T00:00');
                const weekNum = getISOWeek(d);
                weekMap[weekNum] = (weekMap[weekNum] || 0) + arr.length;
            }
            let busiestWeek = null, busiestWeekCount = 0;
            for (const [w, count] of Object.entries(weekMap)) {
                if (count > busiestWeekCount) {
                    busiestWeekCount = count;
                    busiestWeek = w;
                }
            }
            if (busiestWeek) {
                document.getElementById('metricBusiestWeek').textContent = `Week ${busiestWeek}`;
                document.getElementById('metricBusiestWeekCount').textContent = `${busiestWeekCount} changeovers`;
            } else {
                document.getElementById('metricBusiestWeek').textContent = '—';
                document.getElementById('metricBusiestWeekCount').textContent = '';
            }

            // Avg per working day (excluding Fridays)
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let workingDays = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dt = new Date(currentYear, currentMonth, d);
                if (dt.getDay() !== 5) workingDays++; // 5 = Friday
            }
            const avg = workingDays > 0 ? (total / workingDays).toFixed(1) : '0';
            document.getElementById('metricAvg').textContent = avg;
        }

        function getISOWeek(d) {
            const date = new Date(d.getTime());
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + 3 - (date.getDay() + 6) % 7);
            const week1 = new Date(date.getFullYear(), 0, 4);
            return 1 + Math.round(((date.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
        }

        // ==========================================
        // CALENDAR VIEW
        // ==========================================
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            const byDate = groupByDate();
            const today = new Date();
            const todayKey = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;

            // Header row
            DAYS_OF_WEEK.forEach((day, i) => {
                const cell = document.createElement('div');
                cell.className = `cal-header-cell${i === 6 ? ' friday' : ''}`;
                cell.textContent = day;
                grid.appendChild(cell);
            });

            // First day of month
            const firstDay = new Date(currentYear, currentMonth, 1);
            // getDay(): 0=Sun...6=Sat. Our grid starts on Saturday(6).
            // Map: Sat=0, Sun=1, Mon=2, Tue=3, Wed=4, Thu=5, Fri=6
            const jsDay = firstDay.getDay(); // 0-6 (Sun-Sat)
            const gridOffset = (jsDay + 1) % 7; // Convert to our Sat-start grid

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Empty cells before first day
            for (let i = 0; i < gridOffset; i++) {
                const empty = document.createElement('div');
                empty.className = 'cal-day empty';
                grid.appendChild(empty);
            }

            // Day cells
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(currentYear, currentMonth, d);
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isFriday = dateObj.getDay() === 5;
                const isToday = dateKey === todayKey;
                const changeovers = byDate[dateKey] || [];

                const cell = document.createElement('div');
                cell.className = `cal-day${isFriday ? ' friday' : ''}${isToday ? ' today' : ''}`;
                cell.setAttribute('data-date', dateKey);

                if (changeovers.length > 0) {
                    cell.onclick = () => openDayModal(dateKey, changeovers);
                }

                // Top row: number + count
                const topRow = document.createElement('div');
                topRow.className = 'flex justify-between items-start mb-1';

                const numEl = document.createElement('span');
                numEl.className = 'day-num';
                numEl.textContent = d;
                topRow.appendChild(numEl);

                if (changeovers.length > 0) {
                    const countEl = document.createElement('span');
                    countEl.className = 'day-count';
                    countEl.textContent = changeovers.length;
                    topRow.appendChild(countEl);
                }

                if (isFriday) {
                    const badge = document.createElement('span');
                    badge.className = 'text-[8px] font-bold text-rose-400 uppercase';
                    badge.textContent = 'Holiday';
                    topRow.appendChild(badge);
                }

                cell.appendChild(topRow);

                // QCO chips (show max 3)
                const maxChips = 3;
                const chipsToShow = changeovers.slice(0, maxChips);
                chipsToShow.forEach(co => {
                    const chip = document.createElement('span');
                    chip.className = 'qco-chip';
                    chip.setAttribute('data-qco', co.qcoNumber || co.id);
                    chip.textContent = getChipLabel(co);
                    cell.appendChild(chip);
                });

                if (changeovers.length > maxChips) {
                    const more = document.createElement('span');
                    more.className = 'qco-chip text-center text-violet-600 bg-violet-50 border-violet-200';
                    more.textContent = `+${changeovers.length - maxChips} more`;
                    cell.appendChild(more);
                }

                grid.appendChild(cell);
            }
        }

        // ==========================================
        // LINEWISE VIEW
        // ==========================================
        function renderLinewise() {
            const table = document.getElementById('linewiseTable');
            table.innerHTML = '';

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            // Build EXPLODED line-to-changeovers map
            // Each complex line (e.g. "8+5") gets split into "8" and "5" rows
            const lineMap = {}; // singleLineKey -> { dateKey -> [changeovers] }
            allChangeovers.forEach(co => {
                const subLines = resolveSubLines(co.lineNumber);
                const dateKey = getDateKey(co.scheduledDate);
                if (!dateKey) return;
                subLines.forEach(sl => {
                    if (!lineMap[sl]) lineMap[sl] = {};
                    if (!lineMap[sl][dateKey]) lineMap[sl][dateKey] = [];
                    lineMap[sl][dateKey].push(co);
                });
            });

            // Build ordered list of individual line numbers from explodedPersonnel
            const allSingleLines = new Set([...Object.keys(explodedPersonnel), ...Object.keys(lineMap)]);
            const orderedLines = [...allSingleLines].sort((a, b) => {
                const numA = parseInt(a.replace(/[^0-9]/g, '')) || 999;
                const numB = parseInt(b.replace(/[^0-9]/g, '')) || 999;
                if (numA !== numB) return numA - numB;
                return a.localeCompare(b);
            });

            // Header row
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            const lineHeader = document.createElement('th');
            lineHeader.className = 'line-header';
            lineHeader.textContent = 'Supervisor / Line';
            headerRow.appendChild(lineHeader);

            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(currentYear, currentMonth, d);
                const isFriday = dateObj.getDay() === 5;
                const th = document.createElement('th');
                th.className = isFriday ? 'friday-col' : '';
                th.textContent = d;
                headerRow.appendChild(th);
            }
            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Body rows — one per individual line
            const tbody = document.createElement('tbody');
            orderedLines.forEach(singleLine => {
                const row = document.createElement('tr');
                const lineCell = document.createElement('td');
                lineCell.className = 'line-cell';
                const info = explodedPersonnel[singleLine];
                const supervisor = info ? info.supervisor : '—';
                lineCell.innerHTML = `<span class="text-xs font-bold text-violet-700">${supervisor}</span><br><span class="text-[10px] text-slate-500 font-medium">Line ${singleLine}</span>`;
                row.appendChild(lineCell);

                for (let d = 1; d <= daysInMonth; d++) {
                    const dateObj = new Date(currentYear, currentMonth, d);
                    const isFriday = dateObj.getDay() === 5;
                    const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const td = document.createElement('td');
                    td.className = isFriday ? 'friday-col' : '';

                    const coForCell = (lineMap[singleLine] && lineMap[singleLine][dateKey]) || [];
                    coForCell.forEach(co => {
                        const chip = document.createElement('span');
                        chip.className = 'linewise-cell-chip';
                        chip.setAttribute('data-qco', co.qcoNumber || co.id);
                        const label = displayMode === 'style'
                            ? (co.upcomingStyle || '').slice(-5)
                            : (co.qcoNumber || co.id).split('-').slice(-2).join('-');
                        chip.textContent = label;
                        chip.title = `${co.qcoNumber || co.id} — ${co.currentStyle || '?'} → ${co.upcomingStyle || '?'}`;
                        chip.onclick = (e) => {
                            e.stopPropagation();
                            openDayModal(dateKey, coForCell);
                        };
                        td.appendChild(chip);
                    });

                    row.appendChild(td);
                }
                tbody.appendChild(row);
            });
            table.appendChild(tbody);
        }

        // ==========================================
        // VIEW TOGGLE
        // ==========================================
        function switchView(view) {
            currentView = view;
            const btnCal = document.getElementById('btnCalView');
            const btnLine = document.getElementById('btnLineView');
            const calView = document.getElementById('calendarView');
            const lineView = document.getElementById('linewiseView');

            const activeBtnClass = 'px-4 py-1.5 text-xs font-bold rounded-lg transition-all bg-violet-600 text-white shadow-sm flex items-center gap-2';

            if (view === 'calendar') {
                btnCal.className = activeBtnClass;
                btnCal.innerHTML = '<i data-lucide="calendar" class="w-3.5 h-3.5"></i> Calendar';

                btnLine.innerHTML = '<i data-lucide="list-tree" class="w-3.5 h-3.5"></i> Linewise';
                calView.classList.remove('hidden');
                lineView.classList.add('hidden');
            } else {
                btnLine.className = activeBtnClass;
                btnLine.innerHTML = '<i data-lucide="list-tree" class="w-3.5 h-3.5"></i> Linewise';
                btnCal.className = inactiveBtnClass;
                btnCal.innerHTML = '<i data-lucide="calendar" class="w-3.5 h-3.5"></i> Calendar';

                calView.classList.add('hidden');

        }

        // ==========================================
        // DISPLAY MODE TOGGLE
        // ==========================================
        function switchDisplayMode(mode) {
            displayMode = mode;
            const btnQCO = document.getElementById('btnDisplayQCO');
            const btnStyle = document.getElementById('btnDisplayStyle');
            const btnQCOM = document.getElementById('btnDisplayQCOMobile');
            const btnStyleM = document.getElementById('btnDisplayStyleMobile');

            const activeMobile = 'flex-1 px-3 py-1.5 text-xs font-bold rounded-lg transition-all bg-emerald-600 text-white flex items-center justify-center gap-1.5';

                btnStyle.innerHTML = '<i data-lucide="shirt" class="w-3.5 h-3.5"></i> Style';

                if (btnStyleM) btnStyleM.className = inactiveMobile;
            } else {
                btnStyle.className = activeBtnClass;
                btnStyle.innerHTML = '<i data-lucide="shirt" class="w-3.5 h-3.5"></i> Style';
                btnQCO.className = inactiveBtnClass;
                btnQCO.innerHTML = '<i data-lucide="hash" class="w-3.5 h-3.5"></i> QCO #';
                if (btnStyleM) btnStyleM.className = activeMobile;
                if (btnQCOM) btnQCOM.className = inactiveMobile;
            }
            renderCalendar();
            renderLinewise();

        // ==========================================
        // MONTH NAVIGATION
        // ==========================================
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            loadMonth();
        }

        function goToToday() {
            const now = new Date();
            currentYear = now.getFullYear();
            currentMonth = now.getMonth();
            loadMonth();
        }

        // ==========================================
        // DAY MODAL
        // ==========================================
        function openDayModal(dateKey, changeovers) {
            const d = new Date(dateKey + 'T00:00');
            const dayName = d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('modalDateTitle').textContent = dayName;
            document.getElementById('modalDateCount').textContent = `${changeovers.length} changeover${changeovers.length !== 1 ? 's' : ''}`;

            const body = document.getElementById('modalBody');
            body.innerHTML = '';

            changeovers.forEach(co => {
                const card = document.createElement('div');
                card.className = 'p-4 rounded-xl border border-slate-200 bg-white shadow-sm';

                let timeStr = '—';
                if (co.scheduledDate) {
                    let ds = co.scheduledDate;
                    if (ds.toDate) ds = ds.toDate().toISOString();
                    if (ds.includes('T') && ds.length > 10) {
                        const dt = new Date(ds);
                        timeStr = dt.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
                    }
                }

                // Safe supervisor lookup for complex lines (e.g. 26+4, 6/17)
                let supervisorName = '—';
                if (co.lineNumber) {
                    if (personnelData[co.lineNumber]) {
                        supervisorName = personnelData[co.lineNumber].supervisor;
                    } else if (explodedPersonnel[co.lineNumber]) {
                        supervisorName = explodedPersonnel[co.lineNumber].supervisor;
                    } else {
                        // Try splitting the line number
                        const parts = co.lineNumber.split(/[\+\/]/);
                        if (parts.length > 0 && explodedPersonnel[parts[0].trim()]) {
                            supervisorName = explodedPersonnel[parts[0].trim()].supervisor;
                        }
                    }
                }
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-heading font-bold text-violet-700 text-sm">${co.qcoNumber || co.id}</h4>
                        <div class="text-right">
                            <div class="text-xs font-bold text-slate-800">${supervisorName}</div>
                            <div class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 mt-1 inline-block">Line ${co.lineNumber || '—'}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-xs">
                        <div>
                            <span class="text-slate-400 font-medium">From:</span>
                            <span class="font-bold text-slate-700 ml-1">${co.currentStyle || '—'}</span>
                        </div>
                        <div>
                            <span class="text-slate-400 font-medium">To:</span>
                            <span class="font-bold text-slate-700 ml-1">${co.upcomingStyle || '—'}</span>
                        </div>
                        <div>
                            <span class="text-slate-400 font-medium">Time:</span>
                            <span class="font-bold text-slate-700 ml-1">${timeStr}</span>
                        </div>
                        ${co.poNumber ? `<div><span class="text-slate-400 font-medium">PO:</span> <span class="font-bold text-slate-700 ml-1">${co.poNumber}</span></div>` : ''}
                        ${co.changeoverCategory ? `<div><span class="text-slate-400 font-medium">Category:</span> <span class="font-bold text-slate-700 ml-1">${co.changeoverCategory}</span></div>` : ''}
                    </div>
                `;
                body.appendChild(card);
            });

            document.getElementById('dayModal').classList.remove('hidden');
            document.getElementById('dayModal').classList.add('flex');
            lucide.createIcons();
        }

        function closeDayModal() {
            document.getElementById('dayModal').classList.add('hidden');
            document.getElementById('dayModal').classList.remove('flex');
        }

        // Close modal on backdrop click
        document.getElementById('dayModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('dayModal')) closeDayModal();
        });

        async function searchQCO(inputId) {
            const el = document.getElementById(inputId || 'qcoSearchInput');
            const query = el.value.trim().toUpperCase();
            if (!query) return;

            // Clear previous highlights
            clearHighlights();

            // First check current month (match QCO or style)
            let foundCount = findMatchesInCurrentData(query);

            if (foundCount === 0) {
                // Search Firestore globally — try QCO match first
                try {
                    let matchDoc = null;
                    const snapshot = await db.collection('changeovers')
                        .where('qcoNumber', '>=', query)
                        .where('qcoNumber', '<=', query + '\uf8ff')
                        .limit(5)
                        .get();

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        if (!matchDoc && data.scheduledDate && data.status !== 'discarded') {
                            matchDoc = { id: doc.id, ...data };
                        }
                    });

                    if (!matchDoc) {
                        // Try exact ID match
                        const doc = await db.collection('changeovers').doc(query).get();
                        if (doc.exists && doc.data().scheduledDate && doc.data().status !== 'discarded') {
                            matchDoc = { id: doc.id, ...doc.data() };
                        }
                    }

                    if (!matchDoc) {
                        // Try style-based search: load all and filter client-side
                        const allSnap = await db.collection('changeovers').get();
                        allSnap.forEach(doc => {
                            if (matchDoc) return;
                            const data = doc.data();
                            if (data.status === 'discarded' || !data.scheduledDate) return;
                            const upcoming = (data.upcomingStyle || '').toUpperCase();
                            const current = (data.currentStyle || '').toUpperCase();
                            if (upcoming.includes(query) || current.includes(query)) {
                                matchDoc = { id: doc.id, ...data };
                            }
                        });
                    }

                    if (matchDoc) {
                        // Navigate to correct month
                        let dateStr = matchDoc.scheduledDate;
                        if (dateStr.toDate) dateStr = dateStr.toDate().toISOString();
                        const d = new Date(dateStr);
                        currentYear = d.getFullYear();
                        currentMonth = d.getMonth();
                        await loadMonth();
                        foundCount = findMatchesInCurrentData(query);
                    }
                } catch (e) {
                    console.error("Search error:", e);
                }
            }

            if (foundCount > 0) {
                Swal.fire({
                    icon: 'success',
                    title: 'Found!',
                    text: `${foundCount} match${foundCount > 1 ? 'es' : ''} — highlighted for 10 seconds`,
                    timer: 2000,
                    showConfirmButton: false,
                    position: 'top-end',
                    toast: true
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Not Found',
                    text: `No scheduled changeover matching "${query}"`,
                    timer: 3000,
                    showConfirmButton: false,
                    position: 'top-end',
                    toast: true
                });
            }
        }

        // Search matching QCO number OR style number (partial) in current month data
        function findMatchesInCurrentData(query) {
            const upperQuery = query.toUpperCase();

            // Find ALL matching changeovers
            const matches = allChangeovers.filter(co => {
                const qco = (co.qcoNumber || co.id || '').toUpperCase();
                const upcoming = (co.upcomingStyle || '').toUpperCase();
                const current = (co.currentStyle || '').toUpperCase();
                return qco.includes(upperQuery) || upcoming.includes(upperQuery) || current.includes(upperQuery);
            });

            if (matches.length === 0) return 0;

            let scrolledToFirst = false;

            matches.forEach(match => {
                const dateKey = getDateKey(match.scheduledDate);
                const qcoId = match.qcoNumber || match.id;

                if (currentView === 'calendar') {
                    // Highlight date cell
                    const dateCell = document.querySelector(`.cal-day[data-date="${dateKey}"]`);
                    if (dateCell) {
                        dateCell.classList.add('highlighted');
                        if (!scrolledToFirst) {
                            dateCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            scrolledToFirst = true;
                        }
                    }
                    // Highlight QCO chip
                    const chip = document.querySelector(`.qco-chip[data-qco="${qcoId}"]`);
                    if (chip) chip.classList.add('highlighted');
                } else {
                    // Linewise view — highlight all chips matching this QCO
                    const chips = document.querySelectorAll(`.linewise-cell-chip[data-qco="${qcoId}"]`);
                    chips.forEach(chip => {
                        chip.classList.add('highlighted');
                        if (!scrolledToFirst) {
                            chip.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                            scrolledToFirst = true;
                        }
                    });
                }
            });

            // Remove highlight after 10 seconds
            if (highlightTimeout) clearTimeout(highlightTimeout);
            highlightTimeout = setTimeout(clearHighlights, 10000);

            return matches.length;
        }

        function clearHighlights() {
            document.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
        }

        // ==========================================
        // MOBILE HANDLERS
        // ==========================================
        function searchQCOMobile() {
            searchQCO('qcoSearchInputMobile');
        }

        function switchViewMobile(view) {
            // Sync with desktop switchView
            switchView(view);
            // Update bottom tab active states
            document.getElementById('tabCalendar').classList.toggle('active', view === 'calendar');
            document.getElementById('tabLinewise').classList.toggle('active', view === 'linewise');
            document.getElementById('tabSearch').classList.remove('active');
        }

        function focusMobileSearch() {
            const input = document.getElementById('qcoSearchInputMobile');
            if (input) {
                input.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                setTimeout(() => input.focus(), 300);
            }
        }
    </script>

    <!-- PWA Service Worker & Install Prompt -->
    <script>
        // Service Worker Registration (only on HTTP/HTTPS)
        if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/firebase-messaging-sw.js').then(() => {
                    console.log('PWA/FCM Service Worker registered');
                }).catch(err => {
                    console.log('Service Worker registration failed: ', err);
                });
            });
        }

        // PWA Install Prompt
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Show install tab on mobile and desktop install button
            const installTab = document.getElementById('tabInstall');
            if (installTab) installTab.style.display = '';

            const desktopInstallBtn = document.getElementById('btnInstallDesktop');
            if (desktopInstallBtn) desktopInstallBtn.style.display = 'flex';
            console.log('PWA install prompt ready');
        });

        function installPWA() {
            if (!deferredPrompt) {
                // Already installed or not available — show manual instructions
                const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
                if (isIOS) {
                    Swal.fire({
                        icon: 'info',
                        title: 'Install on iOS',
                        html: '<p class="text-sm">Tap the <b>Share</b> button <span style="font-size:1.2em">⎋</span> at the bottom of Safari, then tap <b>"Add to Home Screen"</b>.</p>',
                        confirmButtonText: 'Got it',
                        confirmButtonColor: '#7c3aed'
                    });
                } else {
                    Swal.fire({
                        icon: 'success',
                        title: 'Already Available',
                        text: 'App is already installed or your browser doesn\'t support install prompts.',
                        timer: 3000,
                        showConfirmButton: false,
                        toast: true,
                        position: 'top-end'
                    });
                }
                return;
            }
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted PWA install');
                    const installTab = document.getElementById('tabInstall');
                    if (installTab) installTab.style.display = 'none';
                    const desktopInstallBtn = document.getElementById('btnInstallDesktop');
                    if (desktopInstallBtn) desktopInstallBtn.style.display = 'none';
                }
                deferredPrompt = null;
            });
        }

        // On iOS show install tab always (since beforeinstallprompt doesn't fire)
        if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone) {
            const installTab = document.getElementById('tabInstall');
            if (installTab) installTab.style.display = '';
            const desktopInstallBtn = document.getElementById('btnInstallDesktop');
            // iOS desktop doesn't really exist for this, but just in case for iPad
            if (desktopInstallBtn) desktopInstallBtn.style.display = 'flex';
        }

        window.addEventListener('appinstalled', () => {
            console.log('PWA installed');
            deferredPrompt = null;
            const installTab = document.getElementById('tabInstall');
            if (installTab) installTab.style.display = 'none';
            const desktopInstallBtn = document.getElementById('btnInstallDesktop');
            if (desktopInstallBtn) desktopInstallBtn.style.display = 'none';
        });
    </script>
